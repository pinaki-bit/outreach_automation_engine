services:
  - type: web
    name: outreach-engine-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_SIMILAR
        value: "10"
      - key: MAX_CONTACTS_PER_COMPANY
        value: "5"
